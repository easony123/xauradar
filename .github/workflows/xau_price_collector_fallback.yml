name: XAUUSD Price Collector Fallback

on:
  # Primary schedule remains Supabase Scheduler (every 3 minutes).
  # This GitHub workflow is a resilience fallback for price freshness.
  # It uses a distinct workflow identity to avoid stale schedule registration.
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes fallback when primary scheduler degrades.
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: xauusd-price-collector
  cancel-in-progress: false

jobs:
  collect-price:
    runs-on: ubuntu-latest
    timeout-minutes: 6

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate required secrets
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          [ -n "$TWELVE_DATA_API_KEY" ] || (echo "Missing secret: TWELVE_DATA_API_KEY" && exit 1)
          [ -n "$SUPABASE_URL" ] || (echo "Missing secret: SUPABASE_URL" && exit 1)
          [ -n "$SUPABASE_SERVICE_KEY" ] || (echo "Missing secret: SUPABASE_SERVICE_KEY" && exit 1)

      - name: Collect two cycles with retry
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          set -euo pipefail

          run_collect() {
            local cycle="$1"
            local ok=0
            for attempt in 1 2; do
              echo "[$(date -u +'%Y-%m-%dT%H:%M:%SZ')] Cycle ${cycle} attempt ${attempt}"
              if python twelve_price_collector.py; then
                ok=1
                break
              fi
              echo "Cycle ${cycle} attempt ${attempt} failed."
              sleep 5
            done

            if [ "$ok" -ne 1 ]; then
              echo "::error::Cycle ${cycle} failed after retries; dashboard may show STALE if last tick is older than 15 minutes."
              return 1
            fi
          }

          run_collect 1
          sleep 150
          run_collect 2

      - name: Failure annotation
        if: failure()
        run: echo "::error::Twelve Data collector workflow failed. Check logs for retry attempts and last inserted tick timestamp/source."
