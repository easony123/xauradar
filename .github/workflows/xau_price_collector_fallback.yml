name: XAUUSD Price Collector Recovery

on:
  # Primary automation belongs to Supabase Scheduler + Edge Function.
  # Keep this workflow as manual recovery / live edge-function verification only.
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: xauusd-price-collector
  cancel-in-progress: false

jobs:
  recover-price:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Validate recovery secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          [ -n "$SUPABASE_URL" ] || (echo "Missing secret: SUPABASE_URL" && exit 1)
          [ -n "$SUPABASE_SERVICE_KEY" ] || (echo "Missing secret: SUPABASE_SERVICE_KEY" && exit 1)

      - name: Invoke live edge function
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          PRICE_COLLECTOR_CRON_SECRET: ${{ secrets.PRICE_COLLECTOR_CRON_SECRET }}
        run: |
          set -euo pipefail
          endpoint="${SUPABASE_URL%/}/functions/v1/price-collector"
          response_file="$(mktemp)"
          headers=(
            -H "Content-Type: application/json"
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}"
            -H "apikey: ${SUPABASE_SERVICE_KEY}"
          )

          if [ -n "${PRICE_COLLECTOR_CRON_SECRET:-}" ]; then
            headers+=(-H "x-cron-secret: ${PRICE_COLLECTOR_CRON_SECRET}")
          fi

          status=$(curl -sS -o "$response_file" -w "%{http_code}" -X POST "${headers[@]}" "$endpoint" --data '{}')
          cat "$response_file"
          echo
          test "$status" -ge 200
          test "$status" -lt 300

      - name: Failure annotation
        if: failure()
        run: echo "::error::Manual edge-function recovery failed. Check whether the live price-collector deployment, secrets, or scheduler auth settings are still misaligned."
