name: Economic Calendar Scraper

on:
  schedule:
    - cron: '0 0 * * 1-5'  # Mon-Fri at midnight UTC
  workflow_dispatch:

jobs:
  scrape-calendar:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run calendar scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python calendar_scraper.py
